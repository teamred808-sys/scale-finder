name: scale_finder
description: "Scale Finder — Identify musical scales from notes, audio, piano, or guitar input."
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  record: ^5.2.1
  permission_handler: ^11.3.1
  google_mobile_ads: ^5.3.0
  path_provider: ^2.1.5
  path: ^1.9.1

  # Local packages
  theory_engine:
    path: packages/theory_engine
  audio_engine:
    path: packages/audio_engine
  url_launcher: ^6.3.2
  in_app_purchase: ^3.2.3
  file_picker: ^10.3.10
  ffmpeg_kit_flutter_new: 4.1.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
